name: Tests

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        laravel: [10, 11, 12, 13]
        php: [8.2, 8.3, 8.4, 8.5]
        exclude:
          - laravel: 13
            php: 8.2

    steps:
      - uses: actions/checkout@v6

      - name: test against Laravel ${{ matrix.laravel }} on PHP ${{ matrix.php }}
        run: docker build . --build-arg PHP_VERSION=${{ matrix.php }} --build-arg LARAVEL=${{ matrix.laravel }}
